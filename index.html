<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İyi ki Doğdun Ezikko</title>

  <style>
    body{
      margin:0;
      background:#0b0b0b;
      color:#d4af37;
      font-family:Georgia, serif;
      text-align:center;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    h1{
      font-size:60px;
    }

    p{
      max-width:600px;
      padding:20px;
      line-height:1.6;
    }

    button{
      padding:15px 30px;
      background:#d4af37;
      color:black;
      border:none;
      border-radius:30px;
      cursor:pointer;
      font-size:18px;
    }

    #mesaj{
      display:none;
      margin-top:20px;
      font-size:24px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>İyi ki Doğdun Ezikko ✨</h1>

  <p>
    Bu site sana özel hazırlandı.
    Bugün senin günün ❤️
  </p>

  <button onclick="goster()">
    Son Sürpriz
  </button>

  <div id="mesaj">
    Seni çok seviyorum ❤️
  </div>
</div>

<script>
function goster(){
  document.getElementById("mesaj").style.display="block";
}
</script>

</body>
</html>
